name: CI/CD Pipeline - TicketFlow Backend

on:
  push:
    branches:
      - main
    paths:
      - "api-gateway/**"
      - "ticket-service/**"
      - "notification-service/**"
      - "docker-compose.prod.yml"
      - "docker-compose.yml"
      - "Readme.md"

jobs:
  deploy:
    name: Deploy para a Oracle Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Executar comandos via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 Iniciando o Deploy do TicketFlow..."
            cd ~/TicketFlow

            echo "📥 Puxando código novo do GitHub..."
            git pull origin main

            echo "🔨 Compilando a API Gateway..."
            cd api-gateway && chmod +x mvnw && ./mvnw clean package -Dmaven.test.skip=true && cd ..

            echo "🔨 Compilando o Ticket Service..."
            cd ticket-service && chmod +x mvnw && ./mvnw clean package -Dmaven.test.skip=true && cd ..

            echo "🔨 Compilando o Notification Service..."
            cd notification-service && chmod +x mvnw && ./mvnw clean package -Dmaven.test.skip=true && cd ..

            echo "🐳 Reiniciando os containers Docker..."
            sudo docker compose -f docker-compose.prod.yml up -d --build

            echo "🧹 Limpando imagens antigas para salvar espaço no HD..."
            sudo docker image prune -f

            echo "✅ Deploy concluído com sucesso!"
