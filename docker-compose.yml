services:
  postgres:
    image: postgres:15-alpine
    container_name: ticketflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: ticketflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ticketflow-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ticketflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672" # Queue communication gate
      - "15672:15672" # Visual Panel Door
    networks:
      - ticketflow-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: ticketflow-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ticketflow.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - ticketflow-network
    depends_on:
      - postgres

networks:
  ticketflow-network:
    driver: bridge

volumes:
  pgdata:
