spring.application.name=TicketFlow
spring.profiles.active=${APP_PROFILE:test}
spring.jpa.open-in-view=false

cors.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4200}

springdoc.api-docs.path=/api/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.admin.default.email=${ADMIN_EMAIL:admin_local@ticketflow.com}
app.admin.default.password=${ADMIN_PASSWORD:123456}